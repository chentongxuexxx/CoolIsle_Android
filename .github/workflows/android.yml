name: Build Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: "17"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Set Crashlytics Build ID
        run: echo "crashlytics.build.id=${{ github.sha }}" >> gradle.properties

      - name: Prepare signing (if credentials exist)
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/huandao.keystore
            echo "storeFile=huandao.keystore" > app/signing.properties
            echo "storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}" >> app/signing.properties
            echo "keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}" >> app/signing.properties
            echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> app/signing.properties
          fi

      - name: Inject google-services.json (if secret exists)
        run: |
          if [[ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          fi

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: huandao-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Show APK files
        run: find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "No APK found"

name: Build Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  JAVA_VERSION: "17"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "gradle"

      - name: Set Crashlytics Build ID
        run: |
          echo "crashlytics.build.id=${{ github.sha }}" >> gradle.properties

      - name: Create signing.properties (if configured)
        run: |
          if [[ -n "${{ vars.KEYSTORE_STORE_FILE }}" ]]; then
            cat > app/signing.properties << 'EOF'
            storeFile=${{ vars.KEYSTORE_STORE_FILE }}
            storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
            keyAlias=${{ vars.KEYSTORE_KEY_ALIAS }}
            keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
            EOF
          fi

      - name: Restore keystore from secret
        run: |
          if [[ -n "${{ secrets.KEYSTORE_BASE64 }}" ]]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/huandao.keystore
          fi

      - name: Inject google-services.json for Firebase
        run: |
          if [[ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]]; then
            echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        if: ${{ vars.KEYSTORE_STORE_FILE != '' }}

      - name: Build Debug APK (no signing)
        run: ./gradlew assembleDebug --no-daemon
        if: ${{ vars.KEYSTORE_STORE_FILE == '' }}

      - name: Upload symbols for Crashlytics
        run: ./gradlew crashlyticsUploadSymbolsRelease --no-daemon
        if: ${{ vars.KEYSTORE_STORE_FILE != '' && secrets.GOOGLE_SERVICES_JSON != '' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: huandao-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Show APK files
        run: ls -lh app/build/outputs/apk/**/*.apk
